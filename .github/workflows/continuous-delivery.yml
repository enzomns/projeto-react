name: Continuous Delivery
on:
  push:
    branches:
      - main

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Continuous Delivery (zip)
        uses: actions/upload-artifact@v4
        with:
          name: projeto-react.zip
          path: /projeto-react
