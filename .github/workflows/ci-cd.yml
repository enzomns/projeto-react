name: Pipeline CI-CD
on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false

  deliver:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Continuous Delivery (zip)
        uses: actions/upload-artifact@v4
        with:
          name: projeto-react.zip
          path: .


  discord:
    runs-on: ubuntu-latest
    needs: deliver

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5
        
      - name: Discord Notification
        uses: tenzin1308/discord-notification@v1.0.0
        with:
          github-repo-name: ${{ github.repository_name }}
          discord-webhook-url: ${{ secrets.DISCORD_WEBHOOK }}
